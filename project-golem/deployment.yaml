---
# Project Golem - Kubernetes Deployment
# Namespace: catalystlab-shared

apiVersion: v1
kind: ConfigMap
metadata:
  name: golem-config
  namespace: catalystlab-shared
data:
  config.yaml: |
    database:
      host: pgvector-cluster-rw.catalystlab-shared.svc
      port: 5432
      database: vectordb
      user: vectordb
      # password loaded from DB_PASSWORD env var

    embedding:
      url: http://qwen3-embedding-8b-kserve-workload-svc.kserve-lab.svc.cluster.local:8000/v1/embeddings
      model: Qwen/Qwen3-Embedding-8B
      dimensions: 4096

    umap:
      n_neighbors: 30
      min_dist: 0.1
      metric: cosine

    knn:
      k: 5

    server:
      host: 0.0.0.0
      port: 8000

---
apiVersion: v1
kind: Secret
metadata:
  name: golem-db-secret
  namespace: catalystlab-shared
type: Opaque
stringData:
  password: <PGVECTOR_PASSWORD>  # Replace with actual password from pgvector-cluster

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-golem
  namespace: catalystlab-shared
  labels:
    app: project-golem
    component: visualization
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-golem
  template:
    metadata:
      labels:
        app: project-golem
        component: visualization
    spec:
      nodeSelector:
        kubernetes.io/hostname: worker-gpu2
      containers:
      - name: golem-server
        image: quay.io/aicatalyst/project-golem:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: golem-db-secret
              key: password
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
        - name: cortex-data
          mountPath: /data
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 2
            memory: 4Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 5
      volumes:
      - name: config
        configMap:
          name: golem-config
      - name: cortex-data
        persistentVolumeClaim:
          claimName: golem-cortex-pvc

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: golem-cortex-pvc
  namespace: catalystlab-shared
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path

---
apiVersion: v1
kind: Service
metadata:
  name: project-golem
  namespace: catalystlab-shared
  labels:
    app: project-golem
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: project-golem

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: project-golem
  namespace: catalystlab-shared
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: golem.<CLUSTER_IP>.nip.io  # Replace <CLUSTER_IP> with actual cluster external IP
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: project-golem
            port:
              number: 8000
