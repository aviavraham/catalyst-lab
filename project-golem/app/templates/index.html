<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Golem - Neural Memory Visualizer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        #canvas-container {
            width: 100%;
            height: 100%;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            pointer-events: none;
            z-index: 100;
        }

        #header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        #title {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            font-family: 'Courier New', monospace;
        }

        #subtitle {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
        }

        #search-container {
            pointer-events: auto;
            max-width: 750px;
        }

        #search-results {
            margin-top: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #0f0;
            min-height: 20px;
        }

        #top-match {
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.5);
        }

        .category-tag {
            color: #0a0;
        }

        #search-box {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            background: rgba(0, 20, 0, 0.8);
            border: 1px solid #0f0;
            border-radius: 8px;
            color: #0f0;
            outline: none;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
            transition: all 0.3s;
        }

        #search-box:focus {
            background: rgba(0, 30, 0, 0.9);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.6);
        }

        #search-box::placeholder {
            color: #0a0;
        }

        #info-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 20, 0, 0.9);
            border: 1px solid #0f0;
            border-radius: 8px;
            padding: 15px;
            max-width: 300px;
            font-size: 12px;
            color: #0f0;
            pointer-events: auto;
            display: none;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        #info-panel.visible {
            display: block;
        }

        #info-content {
            max-height: 200px;
            overflow-y: auto;
        }

        #controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0, 20, 0, 0.9);
            border: 1px solid #0f0;
            border-radius: 8px;
            padding: 15px;
            font-size: 11px;
            color: #0a0;
            pointer-events: none;
        }

        #controls h3 {
            color: #0f0;
            margin-bottom: 8px;
            font-size: 12px;
        }

        #controls ul {
            list-style: none;
            padding: 0;
        }

        #controls li {
            margin: 4px 0;
        }

        #legend {
            position: absolute;
            top: 80px;
            right: 20px;
            background: rgba(0, 20, 0, 0.85);
            border: 1px solid #0f0;
            border-radius: 8px;
            padding: 15px;
            font-size: 10px;
            color: #0f0;
            pointer-events: none;
            max-height: calc(100vh - 120px);
            overflow-y: auto;
            font-family: 'Courier New', monospace;
        }

        #legend h3 {
            color: #0f0;
            margin-bottom: 10px;
            font-size: 11px;
            letter-spacing: 1px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            margin: 6px 0;
            font-size: 9px;
            letter-spacing: 0.5px;
        }

        .legend-color {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            flex-shrink: 0;
            box-shadow: 0 0 5px currentColor;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            color: #0f0;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }

        .spinner {
            border: 3px solid rgba(0, 255, 0, 0.3);
            border-top: 3px solid #0f0;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(255, 0, 0, 0.9);
            border: 1px solid #f00;
            border-radius: 8px;
            padding: 20px;
            max-width: 500px;
            color: #fff;
            display: none;
        }

        #error-message.visible {
            display: block;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: #0f0;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="canvas-container"></div>

        <div id="ui-overlay">
            <div id="header">
                <div>
                    <div id="title">PROJECT GOLEM // ACTIVE RETRIEVAL</div>
                    <div id="subtitle">RETRIEVAL COMPLETE. FOUND <span id="context-count">0</span> CONTEXTS.</div>
                    <div id="search-container" style="margin-top: 15px;">
                        <input type="text" id="search-box" placeholder="Search the neural cortex..." />
                        <div id="search-results"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="legend">
            <h3>CATEGORIES</h3>
            <div id="legend-items"></div>
        </div>

        <div id="info-panel">
            <div id="info-content"></div>
        </div>

        <div id="controls">
            <h3>CONTROLS</h3>
            <ul>
                <li>🖱️ Left Click + Drag: Rotate</li>
                <li>🖱️ Right Click + Drag: Pan</li>
                <li>🖱️ Scroll: Zoom</li>
                <li>⌨️ Search: Query Memory</li>
            </ul>
        </div>

        <div id="loading">
            <div>Loading Neural Cortex...</div>
            <div class="spinner"></div>
        </div>

        <div id="error-message">
            <h3>Error</h3>
            <p id="error-text"></p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="/static/golem.js?v=large-bloom-radius-nebula"></script>
</body>
</html>
