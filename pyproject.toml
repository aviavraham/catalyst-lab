[tool.ruff]
line-length = 100
target-version = "py311"
src = ["project-golem", "scripts", "mlflow-enrichment-archived"]

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.ruff.lint.isort]
known-first-party = ["project-golem", "scripts"]

[tool.pylint.main]
max-line-length = 100

[tool.pylint."messages control"]
disable = ["C0111"]
