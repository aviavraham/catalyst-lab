apiVersion: v1
kind: ConfigMap
metadata:
  name: llamastack-mlflow-middleware
  namespace: catalystlab-shared
data:
  mlflow_middleware.py: |
    """MLflow tracing middleware for LlamaStack FastAPI app.

    This middleware intercepts LLM inference requests and wraps them with MLflow's
    Python SDK to populate MLflow UI fields (Request, Response, Session, User, etc.)
    that OpenTelemetry auto-instrumentation alone cannot fill.

    Deployed via ConfigMap injection into the llamastack pod.
    Compatible with MLflow 3.x API using fluent API.
    """
    import mlflow
    from fastapi import Request, Response
    from starlette.middleware.base import BaseHTTPMiddleware
    from starlette.background import BackgroundTask
    import json
    import time
    import os
    from mlflow import MlflowClient
    import logging


    def update_trace_metadata_background(trace_id, user_id, session_id, trace_name, version):
        """Update trace metadata in background task after delay.

        MLflow's trace writing is asynchronous, so we need to wait for the trace_info
        row to be written before we can add metadata/tags.
        """
        logger = logging.getLogger(__name__)

        logger.info(f"[MLflow] Starting background metadata update for trace {trace_id}")
        time.sleep(1.0)  # Wait for trace to be written to database

        try:
            client = MlflowClient()
            logger.info(f"[MLflow] Setting metadata for trace {trace_id}: user={user_id}, session={session_id}")
            # Set metadata (immutable attributes)
            client.set_trace_request_metadata(trace_id, "mlflow.trace.user", user_id)
            client.set_trace_request_metadata(trace_id, "mlflow.trace.session", session_id)
            # Set tags (mutable attributes)
            client.set_trace_tag(trace_id, "mlflow.traceName", trace_name)
            client.set_trace_tag(trace_id, "version", version)
            logger.info(f"[MLflow] Successfully updated metadata for trace {trace_id}")
        except Exception as e:
            # Log but don't fail the request if metadata update fails
            logger.warning(f"[MLflow] Failed to update trace metadata for {trace_id}: {e}", exc_info=True)


    class MLflowTracingMiddleware(BaseHTTPMiddleware):
        """FastAPI middleware that creates MLflow traces for inference requests."""

        def __init__(self, app):
            super().__init__(app)
            # Configure MLflow from environment or use cluster service
            tracking_uri = os.getenv(
                "MLFLOW_TRACKING_URI",
                "http://mlflow.catalystlab-shared.svc.cluster.local:5000"
            )
            mlflow.set_tracking_uri(tracking_uri)

            # Use experiment ID from environment or default to llamastack-traces
            experiment_name = os.getenv("MLFLOW_EXPERIMENT_NAME", "llamastack-traces")
            mlflow.set_experiment(experiment_name)

            # Enable MLflow tracing
            mlflow.tracing.enable()

        async def dispatch(self, request: Request, call_next):
            # Only trace LLM inference endpoints, skip health checks and static assets
            if not request.url.path.startswith(("/v1/chat/completions", "/v1/embeddings", "/v1/agents")):
                return await call_next(request)

            # Read request body once and cache for downstream processing
            body = await request.body()
            try:
                request_data = json.loads(body) if body else {}
            except json.JSONDecodeError:
                request_data = {}

            # Extract request metadata for MLflow trace
            model = request_data.get("model", "unknown")
            messages = request_data.get("messages", [])

            # Determine trace name from endpoint and model
            if "chat" in request.url.path:
                span_name = f"chat {model}"
            elif "embedding" in request.url.path:
                span_name = f"embedding {model}"
            elif "agent" in request.url.path:
                span_name = f"agent {request_data.get('agent_id', 'unknown')}"
            else:
                span_name = f"{request.method} {request.url.path}"

            # Extract user and session IDs from headers (or use defaults)
            user_id = request.headers.get("X-User-ID", "system")
            session_id = request.headers.get("X-Session-ID", "llamastack-default")

            # Use MLflow fluent API to create trace with context manager
            with mlflow.start_span(name=span_name, span_type="CHAIN") as span:
                # Set span inputs
                span.set_inputs({"model": model, "messages": messages})

                # Store trace ID for background metadata update
                trace_id = span.request_id

                # Reconstruct request with cached body for downstream processing
                async def receive():
                    return {"type": "http.request", "body": body}

                # Create new request with cached body
                modified_request = Request(request.scope, receive)

                # Process request
                response = await call_next(modified_request)

                # Capture response body (handle streaming vs non-streaming)
                response_body = b""
                async for chunk in response.body_iterator:
                    response_body += chunk

                # Parse response JSON
                try:
                    response_data = json.loads(response_body)
                except json.JSONDecodeError:
                    response_data = {"raw": response_body.decode("utf-8", errors="replace")}

                # Set span outputs
                span.set_outputs(response_data)

                # Update trace status if error
                if response.status_code >= 400:
                    span.set_attribute("status", "ERROR")

            # Create background task to update trace metadata after response is sent
            # This avoids foreign key constraint violations from async trace writing
            background_task = BackgroundTask(
                update_trace_metadata_background,
                trace_id,
                user_id,
                session_id,
                span_name,
                model.split("/")[-1] if "/" in model else model
            )

            # Return response with reconstructed body and background task
            return Response(
                content=response_body,
                status_code=response.status_code,
                headers=dict(response.headers),
                media_type=response.media_type,
                background=background_task,
            )

  inject-middleware.sh: |
    #!/bin/bash
    set -e

    echo "[MLflow Injector] Injecting MLflow middleware into llamastack..."

    # Copy middleware file to site-packages
    cp /mlflow-config/mlflow_middleware.py /usr/local/lib/python3.12/site-packages/llama_stack/core/server/

    # Patch server.py to import and register the middleware
    SERVER_PY="/usr/local/lib/python3.12/site-packages/llama_stack/core/server/server.py"

    # Add import statement after QuotaMiddleware import
    if ! grep -q "from .mlflow_middleware import MLflowTracingMiddleware" "$SERVER_PY"; then
        sed -i '/^from \.quota import QuotaMiddleware/a from .mlflow_middleware import MLflowTracingMiddleware' "$SERVER_PY"
        echo "[MLflow Injector] Added MLflow middleware import"
    fi

    # Add middleware registration after ClientVersionMiddleware
    if ! grep -q "app.add_middleware(MLflowTracingMiddleware)" "$SERVER_PY"; then
        sed -i '/app\.add_middleware(ClientVersionMiddleware)/a\    app.add_middleware(MLflowTracingMiddleware)' "$SERVER_PY"
        echo "[MLflow Injector] Added MLflow middleware registration"
    fi

    echo "[MLflow Injector] Middleware injection complete!"

    # Execute the original llamastack command
    exec opentelemetry-instrument llama stack run "$@"
